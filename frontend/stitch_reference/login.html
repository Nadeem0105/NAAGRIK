<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Community Hero - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "surface-bright": "#f8faf7",
                    "outline": "#74777b",
                    "on-primary-fixed": "#101d25",
                    "inverse-surface": "#2e312f",
                    "on-primary": "#ffffff",
                    "tertiary-fixed-dim": "#ffb958",
                    "error": "#ba1a1a",
                    "tertiary-fixed": "#ffddb6",
                    "surface-variant": "#e1e3e0",
                    "surface-dim": "#d8dbd8",
                    "primary": "#010c14",
                    "tertiary": "#130900",
                    "on-tertiary-fixed-variant": "#643f00",
                    "on-secondary-container": "#1c6280",
                    "on-tertiary": "#ffffff",
                    "surface-container": "#eceeeb",
                    "on-tertiary-fixed": "#2a1800",
                    "background": "#f8faf7",
                    "secondary-fixed": "#c2e8ff",
                    "secondary-container": "#9fdcff",
                    "on-secondary-fixed": "#001e2b",
                    "secondary": "#206583",
                    "on-surface-variant": "#43474b",
                    "on-surface": "#191c1b",
                    "on-secondary-fixed-variant": "#004d67",
                    "on-background": "#191c1b",
                    "surface-tint": "#536069",
                    "error-container": "#ffdad6",
                    "surface": "#f8faf7"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "unit": "4px",
                    "margin-mobile": "16px",
                    "gutter": "24px",
                    "max-width": "1280px",
                    "margin-desktop": "40px"
            },
            "fontFamily": {
                    "headline-md": [
                            "Archivo Narrow"
                    ],
                    "headline-lg": [
                            "Archivo Narrow"
                    ],
                    "body-md": [
                            "Work Sans"
                    ],
                    "body-lg": [

                    ],
                    "utility-code": [
                            "IBM Plex Mono"
                    ],
                    "label-caps": [

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Blueprint grid pattern overlay */
        .blueprint-bg {
            background-color: theme('colors.background');
            background-image: 
                linear-gradient(theme('colors.surface-variant') 1px, transparent 1px),
                linear-gradient(90deg, theme('colors.surface-variant') 1px, transparent 1px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="blueprint-bg min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop text-on-background">
<!-- Clipboard Style Card -->
<main class="w-full max-w-md bg-surface-container-lowest border border-outline/10 rounded-xl shadow-[4px_4px_0px_0px_rgba(22,35,43,0.05)] relative overflow-hidden">
<!-- Header / Metal Clip aesthetic area -->
<div class="h-12 border-b border-outline/10 bg-surface flex items-center justify-center relative">
<!-- Faux clip holes -->
<div class="absolute left-6 w-3 h-3 rounded-full bg-surface-variant border border-outline/10"></div>
<div class="absolute right-6 w-3 h-3 rounded-full bg-surface-variant border border-outline/10"></div>
<span class="font-utility-code text-utility-code text-outline uppercase tracking-widest">Auth_Seq_01</span>
</div>
<div class="p-8 md:p-12 flex flex-col items-center">
<!-- Logo -->
<div class="mb-10 text-center">
<span class="material-symbols-outlined text-4xl text-primary mb-2" data-icon="policy" style="font-variation-settings: 'FILL' 1;">policy</span>
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tighter uppercase">Community Hero</h1>
<p class="font-utility-code text-utility-code text-on-surface-variant mt-2 border-t border-outline/10 pt-2 inline-block">SYSTEM LOGIN REQUIRED</p>
</div>
<!-- Form -->
<form class="w-full flex flex-col gap-6" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase opacity-80" for="email">Official Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full bg-transparent border-0 border-b border-outline/30 focus:border-secondary focus:ring-0 pl-8 pb-2 pt-2 font-body-md text-body-md text-on-background placeholder-outline-variant" id="email" placeholder="user@city.gov" type="email"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase opacity-80" for="password">Access Code</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full bg-transparent border-0 border-b border-outline/30 focus:border-secondary focus:ring-0 pl-8 pb-2 pt-2 font-body-md text-body-md text-on-background placeholder-outline-variant" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center justify-between mt-2">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="rounded-sm border-outline/50 text-secondary focus:ring-secondary/50 w-4 h-4 bg-transparent cursor-pointer" type="checkbox"/>
<span class="font-utility-code text-utility-code text-on-surface-variant group-hover:text-on-background transition-colors">Remember Node</span>
</label>
<a class="font-utility-code text-utility-code text-secondary hover:text-primary transition-colors underline decoration-outline/30 underline-offset-4" href="#">Reset Code</a>
</div>
<!-- Submit Action -->
<button class="w-full bg-secondary text-on-secondary font-label-caps text-label-caps uppercase py-4 rounded flex items-center justify-center gap-2 shadow-[2px_2px_0px_0px_rgba(22,35,43,0.1)] hover:bg-on-secondary-fixed hover:translate-y-px hover:shadow-[1px_1px_0px_0px_rgba(22,35,43,0.1)] transition-all mt-4" type="submit">
<span>Initiate Session</span>
<span class="material-symbols-outlined" data-icon="login">login</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-8 text-center pt-8 border-t border-outline/10 w-full">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Unregistered personnel? <br/>
<a class="font-headline-md text-headline-md text-primary hover:text-secondary underline decoration-2 decoration-secondary/30 underline-offset-4 transition-colors" href="#">Request Access</a>
</p>
</div>
</div>
</main>
</body></html>
