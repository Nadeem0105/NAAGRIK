<style>
        /* Base styles from design system */
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        
        .blueprint-card {
            background-color: theme('colors.surface-container-lowest');
            border: 1px solid rgba(22, 35, 43, 0.1);
            border-radius: theme('borderRadius.xl');
        }

        .blueprint-input {
            border: none;
            border-bottom: 1px solid theme('colors.outline');
            background-color: transparent;
            border-radius: 0;
            padding-left: 0;
            padding-right: 0;
        }
        
        .blueprint-input:focus {
            box-shadow: none;
            border-color: theme('colors.primary');
        }

        .blueprint-button {
            border-radius: theme('borderRadius.lg');
            box-shadow: 0px 2px 0px 0px theme('colors.primary');
        }
        
        .blueprint-button:active {
            box-shadow: 0px 0px 0px 0px theme('colors.primary');
            transform: translateY(2px);
        }
    </style>

<body class="min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop bg-[url('placeholder')] bg-cover bg-center" data-alt="A highly detailed architectural blueprint of a modern city overlayed with subtle, glowing digital nodes. The aesthetic is industrial utility meets civic tech, featuring precise geometric lines in off-white against a muted, paper-like background. The lighting is soft and ambient, highlighting the technical drawing nature of the image. The mood is authoritative and structured, embodying the 'Field Report meets City Blueprint' theme.">
<div class="absolute inset-0 bg-background/80 backdrop-blur-sm z-0"></div>
<div class="relative z-10 w-full max-w-md">
<!-- Header / Logo -->
<div class="text-center mb-8">
<h1 class="font-headline-xl text-headline-xl text-primary tracking-tighter mb-2">COMMUNITY HERO</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Citizen Registration Portal</p>
</div>
<!-- Registration Card -->
<div class="blueprint-card p-8 shadow-sm">
<div class="flex items-center gap-2 mb-6 pb-2 border-b border-outline/10">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">assignment</span>
<span class="font-label-caps text-label-caps text-primary uppercase">Official Registry</span>
<span class="ml-auto font-utility-code text-utility-code text-on-surface-variant">ID: REG-001</span>
</div>
<form class="space-y-6">
<!-- Full Name -->
<div>
<label class="block font-label-caps text-label-caps text-primary/60 uppercase mb-1" for="fullName">Full Name</label>
<input class="blueprint-input w-full font-body-md text-body-md text-on-surface focus:ring-0" id="fullName" name="fullName" placeholder="John Doe" required="" type="text"/>
</div>
<!-- Email -->
<div>
<label class="block font-label-caps text-label-caps text-primary/60 uppercase mb-1" for="email">Email Address</label>
<input class="blueprint-input w-full font-body-md text-body-md text-on-surface focus:ring-0" id="email" name="email" placeholder="john.doe@example.com" required="" type="email"/>
</div>
<!-- Ward/District -->
<div>
<label class="block font-label-caps text-label-caps text-primary/60 uppercase mb-1" for="district">Ward / District</label>
<select class="blueprint-input w-full font-body-md text-body-md text-on-surface focus:ring-0 appearance-none bg-transparent" id="district" name="district" required="">
<option disabled="" selected="" value="">Select your district</option>
<option value="d1">District 1 - North</option>
<option value="d2">District 2 - East</option>
<option value="d3">District 3 - South</option>
<option value="d4">District 4 - West</option>
<option value="d5">District 5 - Central</option>
</select>
</div>
<!-- Password -->
<div>
<label class="block font-label-caps text-label-caps text-primary/60 uppercase mb-1" for="password">Password</label>
<input class="blueprint-input w-full font-body-md text-body-md text-on-surface focus:ring-0" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Confirm Password -->
<div>
<label class="block font-label-caps text-label-caps text-primary/60 uppercase mb-1" for="confirmPassword">Confirm Password</label>
<input class="blueprint-input w-full font-body-md text-body-md text-on-surface focus:ring-0" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Terms -->
<div class="flex items-start gap-2 pt-2">
<input class="mt-1 border-outline text-secondary focus:ring-secondary rounded-sm" id="terms" name="terms" required="" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface-variant text-sm" for="terms">
                        I acknowledge the <a class="text-secondary hover:underline" href="#">Civic Duty Guidelines</a> and <a class="text-secondary hover:underline" href="#">Data Policy</a>.
                    </label>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="blueprint-button w-full bg-secondary text-on-secondary font-label-caps text-label-caps uppercase py-3 flex items-center justify-center gap-2 transition-transform" type="submit">
<span class="material-symbols-outlined text-[18px]">how_to_reg</span>
                        Create Account
                    </button>
</div>
</form>
<div class="mt-8 text-center border-t border-outline/10 pt-6">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Already registered? 
                    <a class="font-label-caps text-label-caps text-secondary uppercase hover:underline ml-1" href="#">Login to Portal</a>
</p>
</div>
</div>
<!-- Footer Blueprint details -->
<div class="mt-6 flex justify-between items-center px-2 opacity-60">
<span class="font-utility-code text-utility-code text-[10px] text-primary">SYS.V.1.0.4</span>
<span class="font-utility-code text-utility-code text-[10px] text-primary">SECURE CONNECTION</span>
</div>
</div>
</body></html>
