<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Field Report - New Issue</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:ital,wght@0,400..700;1,400..700&amp;family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&amp;family=Work+Sans:ital,wght@0,100..900;1,100..900&amp;display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "surface-variant": "#e1e3e0",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed": "#001e2b",
                        "primary-container": "#16232b",
                        "on-secondary": "#ffffff",
                        "on-background": "#191c1b",
                        "inverse-surface": "#2e312f",
                        "primary-fixed": "#d6e4ef",
                        "on-surface-variant": "#43474b",

                        "on-tertiary-container": "#bb7c14",
                        "error": "#ba1a1a",

                        "tertiary-container": "#321d00",

                        "DEFAULT": "0.125rem",

                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "margin-desktop": "40px",
                        "unit": "4px",
                        "max-width": "1280px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Archivo Narrow"],
                        "headline-md": ["Archivo Narrow"],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md text-body-md antialiased min-h-screen flex flex-col">
<!-- Contextual Top Bar for Transactional Flow (Suppressed main nav) -->
<header class="w-full flex items-center justify-between px-margin-mobile md:px-margin-desktop h-16 border-b border-outline/10 bg-background z-10 shrink-0">
<button class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors focus:outline-none">
<span class="material-symbols-outlined text-[20px]">close</span>
<span class="font-label-caps text-label-caps hidden sm:block">CANCEL REPORT</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary tracking-tighter">NEW FIELD REPORT</h1>
<div class="font-utility-code text-utility-code text-on-surface-variant opacity-60">ID: pending</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex items-start md:items-center justify-center p-0 md:p-margin-desktop overflow-y-auto">
<!-- The "Clipboard" Card -->
<div class="w-full max-w-3xl bg-surface-container-lowest md:border md:border-outline/20 md:shadow-sm rounded-none md:rounded-xl flex flex-col min-h-[calc(100vh-64px)] md:min-h-0 relative">
<!-- Progress Stepper Header -->
<div class="flex border-b border-outline/10 bg-surface-container-lowest shrink-0 overflow-x-auto no-scrollbar">
<!-- Step 1: Active -->
<div class="flex-1 min-w-[140px] py-4 px-4 sm:px-6 bg-secondary/5 border-r border-outline/10 flex items-center justify-center sm:justify-start gap-2 border-b-2 border-b-secondary relative">
<span class="material-symbols-outlined text-secondary text-[18px] fill-icon">add_a_photo</span>
<span class="font-label-caps text-label-caps text-secondary">01. MEDIA</span>
</div>
<!-- Step 2: Inactive -->
<div class="flex-1 min-w-[140px] py-4 px-4 sm:px-6 text-on-surface-variant border-r border-outline/10 flex items-center justify-center sm:justify-start gap-2 opacity-60">
<span class="material-symbols-outlined text-[18px]">list_alt</span>
<span class="font-label-caps text-label-caps">02. DETAILS</span>
</div>
<!-- Step 3: Inactive -->
<div class="flex-1 min-w-[140px] py-4 px-4 sm:px-6 text-on-surface-variant flex items-center justify-center sm:justify-start gap-2 opacity-60">
<span class="material-symbols-outlined text-[18px]">fact_check</span>
<span class="font-label-caps text-label-caps">03. REVIEW</span>
</div>
</div>
<!-- Form Body (Step 1) -->
<div class="p-6 sm:p-8 md:p-12 flex flex-col gap-10 flex-grow">
<!-- Section 1: Media Capture -->
<section class="flex flex-col gap-6">
<!-- Blueprint Header -->
<div class="w-full flex items-center gap-4">
<h2 class="font-label-caps text-label-caps text-on-surface-variant tracking-wider">SEC. 1 // EVIDENCE</h2>
<div class="h-px bg-outline/20 flex-grow"></div>
</div>
<!-- Large Dropzone -->
<div class="w-full h-48 sm:h-64 border-2 border-dashed border-outline/30 rounded-lg flex flex-col items-center justify-center gap-4 hover:border-secondary hover:bg-secondary/5 transition-all cursor-pointer group bg-surface-container/30 relative">
<div class="h-16 w-16 rounded-full bg-surface-container flex items-center justify-center group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-secondary text-[32px]">upload_file</span>
</div>
<div class="text-center px-4">
<p class="font-headline-md text-headline-md text-primary mb-1">Upload Photo Evidence</p>
<p class="font-utility-code text-utility-code text-on-surface-variant">Drag and drop or click to browse (Max 5MB)</p>
</div>
<input accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" type="file"/>
</div>
</section>
<!-- Section 2: Geolocation -->
<section class="flex flex-col gap-6">
<!-- Blueprint Header -->
<div class="w-full flex items-center gap-4">
<h2 class="font-label-caps text-label-caps text-on-surface-variant tracking-wider">SEC. 2 // GEOLOCATION</h2>
<div class="h-px bg-outline/20 flex-grow"></div>
</div>
<!-- Map Container -->
<div class="w-full border border-outline/20 rounded-lg overflow-hidden flex flex-col">
<div class="h-64 w-full relative bg-surface-container-low">
<!-- Map Image Placeholder -->
<img class="w-full h-full object-cover opacity-80 mix-blend-multiply filter grayscale" data-alt="A detailed overhead map view of an urban city intersection with gray streets, subtle topographical lines, and sparse minimal building footprints. The style is utilitarian, like a modern digital blueprint. A bright solid blue location pin sits precisely in the center." data-location="City Streets" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDEKebuM7MH2piOggkutZTj4-qEHtNc3Tk5dd--1Gtv4I8uKl-Gjq28fAWyw-4jKN-lw61cJOn9kJVQyUqyJsmiGiVRP52sEgj6uxAw6Y0VXGMkJwGZwe6NyPLP6NC0mZ27UVptz9pIY_rO3nNCA3rVLZoyCHHLxLFs8c4nQaRTUMCUweFlk3ftGOyZ3UevM3OES8V6quaOIPe2qkKcK_unLfosF2BcaJFxJUMhda9DvToC-QtSDNn0eYa9fZlWnmVJNRG2tXs-o0iI"/>
<!-- Center Pin overlay -->
<div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
<span class="material-symbols-outlined text-secondary text-[40px] drop-shadow-md fill-icon">location_on</span>
<div class="w-2 h-1 bg-black/20 rounded-full blur-[2px] mt-1"></div>
</div>
<!-- Map Actions -->
<div class="absolute bottom-4 right-4 flex flex-col gap-2">
<button class="w-10 h-10 bg-surface-container-lowest border border-outline/20 shadow-sm flex items-center justify-center text-primary hover:bg-surface-container-low transition-colors rounded">
<span class="material-symbols-outlined text-[20px]">my_location</span>
</button>
</div>
</div>
<!-- Manual Address Input (Blueprint styling) -->
<div class="flex items-center bg-surface-container-lowest border-t border-outline/20 p-2">
<span class="material-symbols-outlined text-outline p-2">search</span>
<input class="flex-grow font-utility-code text-utility-code bg-transparent border-none focus:ring-0 text-primary placeholder:text-outline-variant py-2 px-2 h-full" placeholder="Or enter street address manually..." type="text"/>
</div>
</div>
</section>
</div>
<!-- Footer Actions -->
<div class="p-6 sm:px-8 md:px-12 md:py-6 bg-surface-container/50 border-t border-outline/10 flex flex-col sm:flex-row justify-between items-center gap-4 shrink-0">
<button class="text-on-surface-variant hover:text-primary font-label-caps text-label-caps py-2 px-4 transition-colors hidden sm:block focus:outline-none">
                    SAVE DRAFT
                </button>
<!-- Primary Action with Hard-edge shadow for "tactile" feel -->
<button class="w-full sm:w-auto px-8 py-4 bg-secondary text-on-secondary font-label-caps text-label-caps rounded flex items-center justify-center gap-3 shadow-[2px_2px_0px_0px_#16232b] hover:-translate-y-[1px] hover:shadow-[3px_3px_0px_0px_#16232b] active:translate-y-[2px] active:shadow-none transition-all focus:outline-none">
                    PROCEED TO DETAILS
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</div>
</main>
</body></html>
